name = "equality_needs_multiplication"
version = "0.1.0"
keywords = ["math", "lean", "matching", "equality"]
defaultTargets = ["Sameness"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
